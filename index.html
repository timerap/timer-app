<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عداد المهام الذكي</title>
    <!-- خط تجوال العربي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --text-muted: #a5b4fc;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        
        body {
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .container { max-width: 480px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; }

        /* Glass Card Style */
        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            animation: fadeIn 0.6s ease-out;
        }

        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; gap: 20px; margin-top: 10vh; }        .logo { font-size: 64px; text-align: center; margin-bottom: 10px; animation: pulse 3s infinite; }
        
        input {
            width: 100%; padding: 16px 20px; border-radius: 16px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: white; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none; font-size: 18px; 
            font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-google { background: white; color: #1e1b4b; margin-top: 10px; }
        .btn-google:hover { background: #f1f5f9; }
        
        .toggle-auth { text-align: center; color: var(--text-muted); cursor: pointer; margin-top: 10px; font-size: 14px; }
        .toggle-auth:hover { color: white; text-decoration: underline; }

        /* Home Screen */
        #home-screen { display: none; padding-bottom: 100px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .location-badge { 
            font-size: 12px; background: rgba(34, 197, 94, 0.2); color: #4ade80; 
            padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px;
        }

        .task-item {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.4s ease-out backwards; cursor: pointer; transition: 0.3s;
        }
        .task-item:hover { background: rgba(255,255,255,0.12); transform: translateX(-4px); }
        .task-item.completed { opacity: 0.5; }
        .task-item.completed .task-title { text-decoration: line-through; }
        
        .task-info h3 { font-size: 16px; margin-bottom: 4px; }
        .task-info p { font-size: 12px; color: var(--text-muted); }
        .timer-display { font-size: 24px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
        .timer-running { color: var(--primary); animation: pulse 1s infinite; }

        /* FAB & Modal */
        .fab {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 64px; height: 64px; border-radius: 50%; background: var(--primary);
            border: none; color: white; font-size: 32px; cursor: pointer; box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
            transition: 0.3s; z-index: 100;
        }
        .fab:hover { transform: translateX(-50%) scale(1.1); }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            display: none; align-items: flex-end; justify-content: center; z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1e1b4b; border-top: 1px solid var(--glass-border);
            border-radius: 32px 32px 0 0; padding: 32px; width: 100%; max-width: 480px;
            animation: fadeIn 0.3s ease-out;
        }
        .time-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0; }
        .time-inputs input { text-align: center; font-size: 20px; font-weight: 700; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state span { font-size: 48px; display: block; margin-bottom: 16px; }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="card">
        <div class="logo">⏱️</div>
        <h2 style="text-align:center; margin-bottom:8px;" id="auth-title">تسجيل الدخول</h2>
        <p style="text-align:center; color:var(--text-muted); margin-bottom:20px; font-size:14px;">تتبع وقتك بذكاء حسب موقعك</p>
        
        <input type="email" id="email-input" placeholder="البريد الإلكتروني" />
        <input type="password" id="pass-input" placeholder="كلمة المرور" />
        
        <button class="btn btn-primary" id="auth-btn" onclick="handleAuth()">تسجيل الدخول</button>
        <button class="btn btn-google" onclick="handleGoogleAuth()">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l6.19 5.238C42.012 34.24 44 29.39 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
            المتابعة عبر جوجل
        </button>
        
        <div class="toggle-auth" onclick="toggleAuthMode()" id="auth-toggle">ليس لديك حساب؟ أنشئ واحداً</div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen">
        <div class="header">
            <div>
                <h1 style="font-size:24px;">مهامي ⏱️</h1>
                <div class="location-badge" id="location-badge">
                    ...
                </div>            </div>
            <button onclick="logout()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;">خروج</button>
        </div>

        <div id="tasks-list"></div>
    </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="add-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
        <h2 style="margin-bottom:20px;">➕ مهمة جديدة</h2>
        <input type="text" id="task-title" placeholder="اسم المهمة..." style="margin-bottom:12px;" />
        <div class="time-inputs">
            <div><input type="number" id="inp-h" placeholder="00" min="0" max="99" /><label style="font-size:11px;color:var(--text-muted);display:block;text-align:center;margin-top:4px;">ساعة</label></div>
            <div><input type="number" id="inp-m" placeholder="00" min="0" max="59" /><label style="font-size:11px;color:var(--text-muted);display:block;text-align:center;margin-top:4px;">دقيقة</label></div>
            <div><input type="number" id="inp-s" placeholder="00" min="0" max="59" /><label style="font-size:11px;color:var(--text-muted);display:block;text-align:center;margin-top:4px;">ثانية</label></div>
        </div>
        <button class="btn btn-primary" onclick="addTask()" style="margin-top:16px;">حفظ المهمة</button>
    </div>
</div>

<button class="fab" id="fab" onclick="openModal()" style="display:none;">+</button>

<script>
// ==================== DATABASE (IndexedDB) ====================
const DB_NAME = 'TimeTrackerDB';
const DB_VERSION = 1;
let db;

function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains('users')) {
                database.createObjectStore('users', { keyPath: 'email' });
            }
            if (!database.objectStoreNames.contains('tasks')) {
                const store = database.createObjectStore('tasks', { keyPath: 'id' });
                store.createIndex('userEmail', 'userEmail', { unique: false });
            }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onerror = () => reject(request.error);
    });
}

function dbAdd(storeName, data) {
    return new Promise((resolve, reject) => {        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).add(data);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

function dbGetAll(storeName, indexName, value) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const req = indexName ? store.index(indexName).getAll(value) : store.getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

function dbPut(storeName, data) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(data);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
    });
}

// ==================== STATE ====================
let currentUser = null;
let isLoginMode = true;
let activeTimerId = null;
let timerInterval = null;
let userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;

// ==================== AUTH LOGIC ====================
function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-title').textContent = isLoginMode ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
    document.getElementById('auth-btn').textContent = isLoginMode ? 'تسجيل الدخول' : 'إنشاء حساب';
    document.getElementById('auth-toggle').textContent = isLoginMode ? 'ليس لديك حساب؟ أنشئ واحداً' : 'لديك حساب بالفعل؟ سجل الدخول';
}

async function handleAuth() {
    const email = document.getElementById('email-input').value.trim();
    const pass = document.getElementById('pass-input').value.trim();
    if (!email || !pass) return alert('يرجى ملء جميع الحقول');

    try {
        if (isLoginMode) {
            const users = await dbGetAll('users');
            const user = users.find(u => u.email === email && u.password === pass);            if (!user) return alert('بيانات الدخول غير صحيحة');
            loginUser(user);
        } else {
            const users = await dbGetAll('users');
            if (users.find(u => u.email === email)) return alert('البريد مسجل مسبقاً');
            const newUser = { email, password: pass, name: email.split('@')[0], createdAt: new Date() };
            await dbAdd('users', newUser);
            loginUser(newUser);
        }
    } catch (err) { console.error(err); alert('حدث خطأ، حاول مرة أخرى'); }
}

function handleGoogleAuth() {
    // محاكاة تسجيل دخول جوجل (في الإنتاج الفعلي استخدم Firebase SDK)
    const mockUser = { email: 'user@gmail.com', password: '', name: 'مستخدم جوجل', createdAt: new Date(), isGoogle: true };
    // التحقق من وجود المستخدم أو إنشاؤه
    dbGetAll('users').then(users => {
        const existing = users.find(u => u.email === mockUser.email);
        if (existing) { loginUser(existing); }
        else { dbAdd('users', mockUser).then(() => loginUser(mockUser)); }
    });
}

function loginUser(user) {
    currentUser = user;
    localStorage.setItem('currentUser', JSON.stringify(user));
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('home-screen').style.display = 'block';
    document.getElementById('fab').style.display = 'flex';
    detectLocation();
    loadTasks();
}

function logout() {
    stopActiveTimer();
    currentUser = null;
    localStorage.removeItem('currentUser');
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('fab').style.display = 'none';
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('email-input').value = '';
    document.getElementById('pass-input').value = '';
}

// ==================== LOCATION ====================
function detectLocation() {
    const badge = document.getElementById('location-badge');
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {                // في الإنتاج استخدم reverse geocoding API للحصول على اسم المدينة
                // هنا نعرض المنطقة الزمنية المكتشفة تلقائياً
                badge.innerHTML = `📍 ${userTimeZone}`;
                badge.style.background = 'rgba(34, 197, 94, 0.2)';
                badge.style.color = '#4ade80';
            },
            () => {
                badge.innerHTML = `📍 ${userTimeZone} (افتراضي)`;
                badge.style.background = 'rgba(234, 179, 8, 0.2)';
                badge.style.color = '#facc15';
            },
            { timeout: 5000 }
        );
    } else {
        badge.innerHTML = `📍 ${userTimeZone}`;
    }
}

// ==================== TASKS & TIMER ====================
async function loadTasks() {
    if (!currentUser) return;
    const tasks = await dbGetAll('tasks', 'userEmail', currentUser.email);
    tasks.sort((a, b) => b.createdAt - a.createdAt);
    renderTasks(tasks);
}

function renderTasks(tasks) {
    const list = document.getElementById('tasks-list');
    if (tasks.length === 0) {
        list.innerHTML = '<div class="empty-state"><span>📋</span><p>لا توجد مهام بعد<br>اضغط + لإضافة مهمة جديدة</p></div>';
        return;
    }
    list.innerHTML = tasks.map((t, i) => {
        const remaining = Math.max(0, t.durationSeconds - t.elapsedSeconds);
        const isActive = activeTimerId === t.id;
        return `
        <div class="task-item ${t.isCompleted ? 'completed' : ''}" 
             style="animation-delay:${i * 0.05}s"
             onclick="toggleTimer('${t.id}')">
            <div class="task-info">
                <h3 class="task-title">${escapeHtml(t.title)}</h3>
                <p>${formatTime(t.durationSeconds)} • ${t.locationName || userTimeZone}</p>
            </div>
            <div class="timer-display ${isActive ? 'timer-running' : ''}" id="timer-${t.id}">
                ${formatTime(remaining)}
            </div>
        </div>`;
    }).join('');
}
function formatTime(totalSec) {
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function addTask() {
    const title = document.getElementById('task-title').value.trim();
    const h = parseInt(document.getElementById('inp-h').value) || 0;
    const m = parseInt(document.getElementById('inp-m').value) || 0;
    const s = parseInt(document.getElementById('inp-s').value) || 0;
    const totalSeconds = h * 3600 + m * 60 + s;

    if (!title) return alert('أدخل اسم المهمة');
    if (totalSeconds <= 0) return alert('حدد وقتاً صحيحاً');

    const task = {
        id: crypto.randomUUID(),
        userEmail: currentUser.email,
        title,
        durationSeconds: totalSeconds,
        elapsedSeconds: 0,
        createdAt: Date.now(),
        locationName: userTimeZone,
        isCompleted: false
    };

    await dbAdd('tasks', task);
    closeModal();
    document.getElementById('task-title').value = '';
    document.getElementById('inp-h').value = '';
    document.getElementById('inp-m').value = '';
    document.getElementById('inp-s').value = '';
    loadTasks();
}

async function toggleTimer(taskId) {
    if (activeTimerId === taskId) {
        stopActiveTimer();
        return;
    }

    // إيقاف أي مؤقت نشط آخر    stopActiveTimer();

    const tasks = await dbGetAll('tasks', 'userEmail', currentUser.email);
    const task = tasks.find(t => t.id === taskId);
    if (!task || task.isCompleted) return;

    activeTimerId = taskId;
    const display = document.getElementById(`timer-${taskId}`);
    if (display) display.classList.add('timer-running');

    timerInterval = setInterval(async () => {
        task.elapsedSeconds++;
        const remaining = task.durationSeconds - task.elapsedSeconds;

        // تحديث الواجهة مباشرة بدون إعادة رسم كاملة
        if (display) display.textContent = formatTime(Math.max(0, remaining));

        // حفظ في قاعدة البيانات كل 5 ثوانٍ لتقليل الحمل
        if (task.elapsedSeconds % 5 === 0) {
            await dbPut('tasks', task);
        }

        if (remaining <= 0) {
            stopActiveTimer();
            task.isCompleted = true;
            await dbPut('tasks', task);
            loadTasks();
            // إشعار صوتي بسيط
            try { new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU').play(); } catch(e){}
        }
    }, 1000);
}

function stopActiveTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    if (activeTimerId) {
        const display = document.getElementById(`timer-${activeTimerId}`);
        if (display) display.classList.remove('timer-running');
        activeTimerId = null;
    }
}

// ==================== MODAL ====================
function openModal() { document.getElementById('add-modal').classList.add('active'); }
function closeModal() { document.getElementById('add-modal').classList.remove('active'); }

// ==================== INIT ====================
(async function init() {
    await openDB();
    const saved = localStorage.getItem('currentUser');    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            loginUser(currentUser);
        } catch(e) { localStorage.removeItem('currentUser'); }
    }
})();
</script>
</body>
</html>
